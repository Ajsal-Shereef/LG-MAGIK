
defaults:
  - env: MiniWorld
  - _self_

models:
  model_name: "diffusion_imagination"
  vae_path: "model_weights/DARLA/MiniWorld/2025-12-31_12-17-26_FYFNZA/TextConditionedVAE.tar" 
  
  # For get_dataloader compatibility
  model:
    observation_mode: ${env.observation_mode}
    max_sequence_length: 77
  
  data:
    train_dir: data/MiniWorld/agent
    cache_dir: null
    batch_size: 32
    num_workers: 8
    image_column: image
    caption_column: text
    text_encoder_path: openai/clip-vit-base-patch32

  accelerator:
    project_dir: "logs/diffusion"
    logging_dir: "logs/diffusion"
    gradient_accumulation_steps: 1
    mixed_precision: "fp16"
    log_with: "wandb"
    
  training:
    seed: 42
    experiment_name: "diffusion_imagination_v1"
    num_epochs: 100
    save_interval: 1000
    log_media_interval: 500
    num_images_to_generate: 4
    
  optimizer:
    lr: 1e-4
    beta1: 0.9
    beta2: 0.999
    weight_decay: 1e-2
    eps: 1e-8

save_path: "model_weights/diffusion"

env:
  name: "MiniWorld"

