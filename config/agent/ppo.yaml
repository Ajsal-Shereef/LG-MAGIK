# General agent and path configuration
_target_: agents.ppo.PPO
video_save_path: result
name: PPO

# Network architecture parameters
# Note: These parameters configure the CNNCritic (and CNNActor if it is also made configurable)
network:
  _target_: agent.ppo.PPO # Following your convention, the agent class is the target
  input_dim: ???           # Must be specified (e.g., 3 for RGB)
  action_dim: ???          # Must be specified (e.g., 6)
  
  # --- Critic/Actor Network (Conv2d_MLP_Model) Parameters ---
  channels: [32, 64, 64]     # List of output channels for each convolutional layer
  kernel_sizes: [8, 4, 3]    # List of kernel sizes for each conv layer
  strides: [4, 2, 1]         # List of strides for each conv layer
  paddings: [0, 0, 0]        # List of paddings for each conv layer
  cnn_activ: 'relu'
  use_maxpool: False
  
  # --- MLP Head Parameters ---
  # IMPORTANT: Calculate this based on your CNN config and input image size.
  # e.g., for 84x84 input, (64 * 7 * 7) = 3136
  fc_input_size : 2304
  
  fc_hidden_sizes: [512]
  fc_hidden_activation: 'relu'
  fc_output: 512             # Output feature dimension from the main network body
  norm : 'none'
  dropout_prob: 0.0
  # Note: fc_output_activation is not used by the critic's main net, 
  # as it has its own final q_layer (linear).

# Core learning hyperparameters
hyperparameters:
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  batch_size: 64           # Minibatch size for optimization epochs
  update_timestep: 2048    # Rollout buffer size (steps to collect before update)
  clip_grad_param: 0.5
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.0
  eps: 1.0e-08             # Epsilon for AdamW optimizer

# Training and exploration strategy
training:
  gamma: 0.99              # Discount factor
  gae_lambda: 0.95         # Lambda for GAE
  clip_epsilon: 0.2        # PPO clipping parameter
  epochs: 10               # Number of optimization epochs per rollout
  ent_coef: 0.01           # Entropy coefficient
  vf_coef: 0.5             # Value function (critic) loss coefficient
  mission : ???           # Mission or environment name

# Testing and evaluation settings
evaluation:
  test_episodes: 10
  checkpoint: model_weights/PPO/2025-10-28_14-05-41_6ONTOT/