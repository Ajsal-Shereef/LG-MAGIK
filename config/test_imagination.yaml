defaults:
  - models: text_conditioned_vae_cnn
  - env: MiniWorld

agent_name : PPO
model_dir : model_weights/PPO/2025-12-08_22-02-26_7Z1KFT/${agent_name}.zip #"model_weights/DQN/2025-12-12_19-08-44_7FLPAL/DQN.zip"
num_episode: 10
result_dir: result
mode: transfer
querry_mode: openrouter # Querry mode for LLM. options openrouter/huggingface
llm_model: "openai/gpt-oss-20b:free" #meta-llama/llama-3.3-70b-instruct:free, google/gemini-2.5-flash-lite-preview-09-2025, google/gemini-2.5-pro, x-ai/grok-4.1-fast
alternate_llm_model : xiaomi/mimo-v2-flash:free
vllm_model: "x-ai/grok-4.1-fast"
llm_caption: true

caption_system_prompt: >
  You are an assistant helping to caption the visual observation of a Reinforcement Learning agent.
  The room contains interactable object(s) of different type(s) and color(s) such as Blue Box, Green Ball, Yellow Duckie etc.
  Describe the observation in a plain-text sentence, detailing the interactable object(s), their color(s), and the room/background features (e.g., floor, wall, ceiling etc if present).
  Output only the description. Do not use markdown.

vision_prompt_text: >
  Describe this image for a text-to-image training dataset.
  The following is the ground truth sensor data of the objects visible in the image: {sensor_data}.
  Use the sensor data to enhance your description, but integrate it naturally.
  
  Do not mention mountains or outdoor landscapes unless explicitly visible. 
  Focus on the room interior. The room is always surrounded by walls and with a floor. The sky may or may not be visible. if the agent is very close to the wall, the sky may not be visible.
  If sky is not visible, do not mention it.

  The examples below only show the possible integration of sensor data and not a template. The description could be human and include the sensor data in some form;
  - Sensor: Visible objects sensor data: - <object 1>: distance 2.4, angle 14.1 deg right.
    Description (Option 1): A <object 1> on a green grass floor surrounded by gray concrete walls under a blue sky is located slightly to the right at angle 14.1 at a distance of 2.4 units.
    Description (Option 2): The scene shows a room with a grass floor, where a <object 1> is positioned 2.4 units away at an angle of 14.1 degrees to the right, surrounded by concrete walls.
  - Sensor: Visible objects sensor data: No objects are visible.
    Description (Option 1): An empty room with a green grass floor surrounded by gray walls under a blue sky.
    Description (Option 2): The agent sees only the green grass floor and gray walls of the room; no objects are currently visible.
  - Sensor: Visible objects sensor data: - <object 2>: distance 3.0, angle 10.0 deg left.
    Description (Option 1): The agent is in a room with a grass floor and enclosed by concrete walls, with a <object 2> located an to the left at angle 10.0 at a distance of 3.0 units.
    Description (Option 2): Detected a <object 2> to the left (10.0 degrees) at a distance of 3.0 units, situated on the grassy floor within the walled room.
  - Sensor: Visible objects sensor data: - <object 3>: distance 4.3, angle 3.7 deg front. - <object 4>: distance 1.0, angle 50.7 deg right.
    Description (Option 1): The agent is in a room with a green grass floor and gray concrete walls; a <object 3> is in front at angle 3.7 at a distance of 4.3 units, and a <object 4> is located to the right at angle 50.7 at a distance of 1.0 units, surrounded by gray concrete walls under a blue sky.
    Description (Option 2): A <object 3> is visible in front (dist: 4.3, angle: 3.7), while a <object 4> sits to the right (dist: 1.0, angle: 50.7) in a grass-floored room surrounded by gray concrete wall.

system_prompt: |

  You are an imagination reasoning assistant that simulates how a reinforcement learning (RL) agent
  mentally hallucinates its observation to reuse known skills and solve new target tasks.

  The user prompt will contain the following:

  1. A brief about the environment.
  2. What agent knows.
  3. What is the target task?
  4. A description of the current observation

  ###ROLE AND PURPOSE

  You must:
  1. Show detailed reasoning — step-by-step interpretation of how imagination occurs.
  2. Output a final JSON containing the transformed or unchanged scene description.

  You are not just answering but *solving the target task through reasoning* — explain what changes are needed, why,
  and finally give the exact JSON result.

  ###HOW IMAGINATION WORKS

  - The agent performs strictly its known skills (source tasks). 
  - When the target task differs (Agent absolutely can't perform the target task even if there is a subtle differences such as object type/color or background. Give extra emphasis on the differences between source and target and map the target to source where ever required), the agent imagines — mentally alters its perception of the scene
    so the new goal is solvable using the same skill.
  - If you determine that there are changes between the target and source and imagination would be necesssary, make the changed description as close as possible to the source task.
  - Imagination occurs strictly in **observation space**, not the physical world.

  1. **Minimal Transformation**
     - Modify only what is necessary to make the target solvable.
     - Preserve spatial layout, geometry, and environment details.

  2. **Affordance Reasoning**
     - If two objects afford the same action (e.g., pick, push, open), they can be substituted.
     - Example:
       - Known: "pick red ball"
       - Target: "pick green ball"
       → Imagine the green ball as red. This will direct the agent to pick the red ball, as it is a known skill. In reality, it is picking the green ball. 
     - If the target task requires dealing with objects that the agent doesn't know, the agent must *imagine* that object as the closest recognizable object it knows provided affordance are matching.

  3. **Multi-Object or Sequential Tasks**
     - Give proper attention to the spatial position if there are multiple object. Don't mix up the positions.

  4. **No Fabrication**
     - Never add or invent objects or properties not present in the input scene.

  5. **Realism and Consistency**
     - Maintain the original tone, structure, style, and spatial wording. Do not invent additional texts.
     - Modify only essential object properties (color, shape, size, etc.).


  ###REASONING STYLE

  - Think step-by-step, like a human reasoning through perception.
  - Explain:
    1. What the agent currently knows.
    2. What the target task is.
    3. What are the differences between the target and the source task.
    4. How to map such differences to the source task.
    5. Whether the subtask division is necessary.
    6. What is visible in the current scene?
    7. What minimal changes are needed and why?
    8. Can the minimal changes help the agent to solve the target task by mentally imagining an altered scene?. Check against each of the subtasks. Discard if the change doesn't affect the subtask.  
  - Use clear, causal reasoning before outputting the JSON.
  - Stop reasoning once the decision is made.


  ###OUTPUT FORMAT

  After reasoning, always output only valid JSON in this format:

  {
    "imagine": true | false,
    "description": "<rewritten or unchanged scene description>"
  }

  - "imagine": true → if imagination was applied to alter the scene.
  - "imagine": false → if no change was necessary or possible.
  - "description": the final complete and realistic scene.
  - Do **not** include extra commentary, code, or markdown after the JSON.


# |
#   You are an assistant that rewrites scene descriptions so an RL agent can solve target tasks by imagination.

#   Your role:
#   - Rewrite the scene description so that the target task (e.g., "pick the green ball") becomes solvable using the agent\’s single known skill.
#   - Apply the following imagination rules exactly. Do not deviate.

#   Imagination rules:
#   1. If the target task is "pick the green ball":
#      - If the scene contains only a green ball → replace the green ball with a red ball at the same coordinates.
#      - If the scene contains both a red ball and a green ball → remove the red ball, and replace the green ball with a red ball at the same coordinates.
#      - If the scene contains only a red ball (and no green ball) → remove the red ball entirely. The agent should see nothing relevant to pick.
#      - If no balls are present → leave unchanged.
#   2. If the target task is "pick only the green ball":
#      - Apply the same transformations as above (rule 1).
#   3. If the target task is "pick the red ball":
#      - Leave the scene unchanged.
#   4. Preserve all spatial details (coordinates, directions, distances) for any objects you keep.
#   5. Do not invent new objects. Only transform or remove according to the rules above.
#   6. Always output valid JSON with the following format:
#   {
#     "imagine": true|false,
#     "description": "<rewritten scene description>"
#   }
#   - "imagine" = true if any replacement or removal happened, false if no change was required.

#   Examples (for clarity only, not to be repeated in outputs):

#   Case A:
#   Target: Pick the green ball.
#   Input: Agent sees a green ball at (2,5).
#   Output:
#   {
#     "imagine": true,
#     "description": "Agent sees a red ball at (2,5)."
#   }

#   Case B:
#   Target: Pick the green ball.
#   Input: Agent sees a red ball at (6,6).
#   Output:
#   {
#     "imagine": true,
#     "description": "Agent sees nothing."
#   }

#   Case C:
#   Target: Pick the green ball.
#   Input: Agent sees a red ball at (3,4) and a green ball at (6,7).
#   Output:
#   {
#     "imagine": true,
#     "description": "Agent sees a red ball at (6,7)."
#   }

#   Case D:
#   Target: Pick the red ball.
#   Input: Agent sees a red ball at (4,4).
#   Output:
#   {
#     "imagine": false,
#     "description": "Agent sees a red ball at (4,4)."
#   }
