# --- Defaults ---
defaults:
  - _self_

project_name: TextConditionedVAE
model_name : "VAE"
seed: null
data:
  train_dir: data/MiniGridRelational/agent
  cache_dir: null
  batch_size: 32
  num_workers: 8
  image_column: image
  caption_column: text
  text_encoder_path: "openai/clip-vit-base-patch32" #openai/clip-vit-base-patch32, zer0int/LongCLIP-GmP-ViT-L-14
  text_encoder_type: "clip"  # "clip" or "nvidia"
  nvidia_model_name: "nvidia/llama-nemotron-embed-1b-v2"
model:
  _target_: VAE.text_conditioned_vae.TextConditionedVAE
  n_downsample: 3
  encoder_n_res: 3
  input_dim: 3
  dim: 64
  norm: ln
  activ: lrelu
  pad_type: replicate
  encoder_final_dim:
  - 8
  - 8
  latent_channel: 8
  text_encoder: ${models.data.text_encoder_path}
  text_encoder_type: ${models.data.text_encoder_type}
  nvidia_embed_dim: 2048
  discriminator_fc_hidden:
  - 64
  - 128
  - 256
  observation_mode : ${env.observation_mode}
  disc_params:
    base_channels: 64
    n_layers: 3
    norm: in
  is_perceptual_loss : true
  use_image_discriminator : false
  use_caption_discriminator : true
  use_club: true           # Enables CLUB mutual information minimization
  use_ema: false
  use_coord_conv : false
  n_text_attn_layers: 3    # Last N decoder blocks use text cross-attention (first blocks use z-only FiLM)
  ema_decay: 0.999
  max_grad_norm: 1.0
  max_sequence_length: 110
training:
  num_epochs: 350
  seed: ${models.seed}
  kl_weight: 1.0
  kl_annealing:
    enable: true
    start: 1.0
    stop: ${models.training.kl_weight}
    n_cycles: 1
    ratio: 0.5
  adv_lambda: 1.0
  adv_weight: 10.0
  logs: logs
  output_dir: model_weights/vae
  experiment_name: ${models.project_name}
  log_media_interval: 8000
  log_values_and_images: False
  validation_prompts: ${env.validation_prompts}
  generate_interval: 8000
  num_images_to_generate : 10
  save_weight_freequency : 50
  img_adv_weight : 10.0
  img_adv_lambda : 1
  club_weight: 0.1           # Weight for CLUB MI loss term
  critic_updates: 1        # Number of discriminator updates per generator update
  recon_mix_weight: 0.5
  is_model_fine_tune : false
optimizer:
  lr: 0.0002
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.01
  eps: 1.0e-08
  lr_club : 0.00001
  scheduler:
    # type: cosine
    # T_max: ${models.training.num_epochs}
    # eta_min: 0.000001
    
    # OneCycleLR
    type: one_cycle
    max_lr: 2e-4
    total_steps: ???
    pct_start: 0.07
    div_factor: 25.0
    final_div_factor: 10000.0
    anneal_strategy: cos
accelerator:
  mixed_precision: 'no'
  gradient_accumulation_steps: 1
  log_with: wandb
  project_dir: ${models.training.logs}
  logging_dir: ${models.training.logs}/logs
test:
  model_dir: model_weights/VAE/MiniGridRelational/2026-04-07_14-11-50_GZC6II/TextConditionedVAE.tar