defaults:
  - _self_

project_name: TextConditionedVAE
model_name : "DARLA"
# --- Data Configuration ---
data:
  train_dir: data/${env.name}/agent
  image_column: "image"
  cache_dir: null
  resolution: 112
  batch_size: 64
  num_workers: 8 
  caption_column: text
  text_encoder_path: openai/clip-vit-base-patch32

# --- VAE Model Architecture ---
model:
  _target_: VAE.vae.VAE
  input_dim: 3
  dim: 64
  n_downsample: 3
  n_res: 2
  activ: "relu"
  pad_type: "zero"
  norm: "in"
  latent_channels: 8

# --- Training Hyperparameters ---
training:
  num_epochs: 250 
  seed: null
  kl_weight: 1
  logs : "logs"
  output_dir: "model_weights/vae"
  experiment_name: "VAE"
  log_media_interval: 8000 # Log images every N steps
  log_values_and_images: True
  generate_interval : 8000
  num_images_to_generate : 8
  save_weight_freequency: 50

# --- Optimizer Configuration (AdamW) ---
optimizer:
  lr: 1e-4 # A slightly higher learning rate can work well for VAEs
  betas: [0.9, 0.999]
  weight_decay: 1e-2
  eps: 1e-8
  scheduler:
    # type: cosine
    # T_max: ${models.training.num_epochs}
    # eta_min: 0.000001
    
    # OneCycleLR Example
    type: one_cycle
    max_lr: 1e-4
    total_steps: 200000 # num_epochs * num_steps_per_epoch
    pct_start: 0.1
    div_factor: 25.0
    final_div_factor: 10000.0
    anneal_strategy: cos

# --- Accelerator Configuration ---
accelerator:
  mixed_precision: 'no' # Can be 'no', 'fp16', or 'bf16'
  gradient_accumulation_steps: 1
  log_with: "wandb" # or "tensorboard", "comet_ml"
  project_dir: ${models.training.logs}
  logging_dir: ${models.training.logs}/logs