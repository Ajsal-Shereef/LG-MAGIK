defaults:
  - _self_

# --- Data Configuration ---
data:
  train_dir: "data/SimplePickup/training"
  image_column: "image"
  caption_column: null # Although not used by VAE, good practice to define
  resolution: 112
  batch_size: 64
  num_workers: 4 
  cache_dir: null 

# --- VAE Model Architecture ---
model:
  _target_: VAE.vae.VAE
  in_channels: 3
  out_channels: 3
  down_block_types: ["DownEncoderBlock2D", "DownEncoderBlock2D", "DownEncoderBlock2D"]
  up_block_types: ["UpDecoderBlock2D", "UpDecoderBlock2D", "UpDecoderBlock2D"]
  block_out_channels: [64, 128, 256]
  layers_per_block: 1
  latent_channels: 4
  norm_num_groups: 32

# --- Training Hyperparameters ---
training:
  num_epochs: 50 # Increased for more realistic training
  seed: 42
  kl_weight: 0.5
  logs : "logs"
  output_dir: "model_weights/vae"
  experiment_name: "VAE"
  log_media_interval: 8000 # Log images every N steps
  log_values_and_images: False
  generate_interval : 8000
  num_images_to_generate : 8

# --- Optimizer Configuration (AdamW) ---
optimizer:
  lr: 1e-4 # A slightly higher learning rate can work well for VAEs
  betas: [0.9, 0.999]
  weight_decay: 1e-2
  eps: 1e-8

# --- Accelerator Configuration ---
accelerator:
  mixed_precision: 'no' # Can be 'no', 'fp16', or 'bf16'
  gradient_accumulation_steps: 1
  log_with: "wandb" # or "tensorboard", "comet_ml"
  project_dir: ${models.training.logs}
  logging_dir: ${models.training.logs}/logs