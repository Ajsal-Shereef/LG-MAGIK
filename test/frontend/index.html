<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magik Lens</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-color: #e0e0e0;
            --input-bg: #262626;
            --border-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* View Container */
        .view-container {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
        }

        .view-container.active {
            display: flex;
        }

        /* Main Grid */
        .view-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr auto;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* Panels */
        .panel {
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .left-panel {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            border-right: none;
        }

        .right-panel {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        .bottom-panel {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
            background-color: var(--surface-color);
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            align-items: flex-start;
            height: 250px;
            box-sizing: border-box;
        }

        /* 2x2 Inner Layout within Panels */
        /* Note: To ensure vertical alignment across panels, we use strict percentages or flex ratios */
        .section-header {
            color: var(--primary-color);
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
            min-height: 200px;
        }

        /* Interactive Upload Container */
        .upload-container {
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .upload-container:hover {
            border-color: var(--primary-color);
        }

        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #888;
            pointer-events: none;
        }

        /* Images */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Hide File Input */
        input[type="file"] {
            display: none;
        }

        /* Controls */
        .controls {
            flex: 1;
            display: flex;
            gap: 20px;
            width: 100%;
            height: 100%;
        }

        .caption-box {
            flex: 4;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        textarea {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #e0e0e0;
            padding: 10px;
            border-radius: 6px;
            resize: none;
            flex: 1;
            font-family: inherit;
        }

        .sliders-box {
            flex: 5;
            display: flex;
            flex-direction: column;
            gap: 5px;
            height: 100%;
        }

        .sliders-scroll {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            gap: 10px;
            margin-bottom: 5px;
        }

        input[type="range"] {
            flex: 1;
            cursor: pointer;
        }

        .action-box {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .sm-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
            background: #333;
            color: #fff;
        }

        .switch-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            z-index: 100;
            background-color: var(--secondary-color);
            font-size: 0.8rem;
            padding: 8px 15px;
        }

        /* Latent Overlay */
        .overlay-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary-color);
            font-weight: bold;
            z-index: 10;
        }

        /* Zoom btns */
        .zoom-ctrl {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 5;
        }

        .zoom-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- ============================================ -->
    <!-- VIEW 1: LATENT VISUALIZATION (Default)       -->
    <!-- ============================================ -->
    <div id="view-latent" class="view-container active">
        <button class="switch-btn" onclick="switchView('imagine')">Switch to Imagination Mode</button>

        <div class="view-grid">
            <!-- Left Panel -->
            <div class="panel left-panel">
                <!-- 1. Input Image Section -->
                <div class="section-header">Input Image</div>
                <div class="image-container upload-container"
                    onclick="document.getElementById('latent-upload').click()">
                    <div class="zoom-ctrl">
                        <button class="zoom-btn" onclick="zoom('latent-input', -1, event)">-</button>
                        <button class="zoom-btn" onclick="zoom('latent-input', 1, event)">+</button>
                    </div>
                    <!-- Placeholder -->
                    <div id="latent-placeholder" class="upload-placeholder">
                        <span style="font-size: 2rem;">+</span>
                        <span>Click to Upload</span>
                    </div>
                    <!-- Image Preview (Replaces placeholder) -->
                    <img id="latent-input-preview" src="" style="display: none;">

                    <input type="file" id="latent-upload" accept="image/*" onchange="handleLatentUpload(this)">
                </div>

                <!-- 2. Original Latent Section -->
                <div class="section-header">Original Latent</div>
                <div class="image-container">
                    <img id="latent-orig-img" src="" style="display: none;">
                </div>
            </div>

            <!-- Right Panel -->
            <div class="panel right-panel">
                <div id="latent-loader" class="overlay-loader" style="display: none;">Processing...</div>

                <!-- 1. Reconstruction Section -->
                <div class="section-header">Reconstruction</div>
                <div class="image-container">
                    <div class="zoom-ctrl">
                        <button class="zoom-btn" onclick="zoom('latent-recon', -1, event)">-</button>
                        <button class="zoom-btn" onclick="zoom('latent-recon', 1, event)">+</button>
                    </div>
                    <img id="latent-recon-img" src="" style="display: none;">
                </div>

                <!-- 2. Modified Latent Section -->
                <div class="section-header">Modified Latent</div>
                <div class="image-container">
                    <img id="latent-mod-img" src="" style="display: none;">
                </div>
            </div>

            <!-- Bottom Panel -->
            <div class="bottom-panel">
                <div class="controls">
                    <div class="caption-box">
                        <label style="color: #888; font-size: 0.8rem; margin-bottom: 5px;">Caption</label>
                        <textarea
                            id="latent-caption">A blue box is visible at 3.1 units and 5.5 degrees to the left, and a green ball is visible at 2.0 units and 24.5 degrees to the right, both located on a green grass floor surrounded by a grey wall under a blue sky.</textarea>
                    </div>

                    <div class="sliders-box">
                        <label style="color: #888; font-size: 0.8rem; margin-bottom: 5px;">Latent Channels ([-10,
                            10])</label>
                        <div id="sliders-container" class="sliders-scroll"></div>
                    </div>

                    <div class="action-box">
                        <button id="latent-generate-btn" onclick="generateLatent(true)">Reconstruct</button>
                        <button class="sm-btn" onclick="resetSliders()">Reset Scale</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- ============================================ -->
    <!-- VIEW 2: IMAGINATION MODE                     -->
    <!-- ============================================ -->
    <div id="view-imagine" class="view-container">
        <button class="switch-btn" onclick="switchView('latent')">Switch to Latent Visualization</button>

        <div class="view-grid">
            <!-- Left Panel -->
            <div class="panel left-panel">
                <div class="section-header">Input Image</div>
                <div class="image-container upload-container" style="flex: 1; max-height: none;"
                    onclick="document.getElementById('imagine-upload').click()">
                    <div class="zoom-ctrl">
                        <button class="zoom-btn" onclick="zoom('imagine-input', -1, event)">-</button>
                        <button class="zoom-btn" onclick="zoom('imagine-input', 1, event)">+</button>
                    </div>

                    <div id="imagine-placeholder" class="upload-placeholder">
                        <span style="font-size: 2rem;">+</span>
                        <span>Click to Upload</span>
                    </div>
                    <img id="imagine-input-preview" src="" style="display: none;">

                    <input type="file" id="imagine-upload" accept="image/*" onchange="handleImagineUpload(this)">
                </div>

                <!-- 2. Original Latent Section (Imagination Mode) -->
                <div class="section-header">Original Latent</div>
                 <div class="image-container">
                    <img id="imagine-orig-latent" src="" style="display: none;">
                </div>
            </div>

            <!-- Right Panel -->
            <div class="panel right-panel">
                <div id="imagine-loader" class="overlay-loader" style="display: none;">Imagining...</div>

                <div class="section-header">Output</div>
                <div class="image-container" style="flex: 1; max-height: none;">
                    <div class="zoom-ctrl">
                        <button class="zoom-btn" onclick="zoom('imagine-output', -1, event)">-</button>
                        <button class="zoom-btn" onclick="zoom('imagine-output', 1, event)">+</button>
                    </div>
                    <img id="imagine-result-img" src="" style="display: none;">
                </div>

                <!-- 2. Reconstructed Latent Section (Imagination Mode) -->
                <div class="section-header">Reconstructed Latent</div>
                <div class="image-container">
                    <img id="imagine-recon-latent" src="" style="display: none;">
                </div>
            </div>

            <!-- Bottom Panel -->
            <div class="bottom-panel">
                <div class="controls">
                    <div class="caption-box">
                        <label style="color: #888; font-size: 0.8rem; margin-bottom: 5px;">Caption Prompt</label>
                        <textarea
                            id="imagine-caption">A blue box is visible at 3.1 units and 5.5 degrees to the left, and a green ball is visible at 2.0 units and 24.5 degrees to the right, both located on a green grass floor surrounded by a grey wall under a blue sky.</textarea>
                    </div>

                    <div class="action-box">
                        <button id="imagine-generate-btn" onclick="generateImagine()"
                            style="width: 50%; align-self: center;">Imagine</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        // State
        let scales = Array(8).fill(1.0);
        let zoomLevels = {
            'imagine-input': 1.0,
            'imagine-output': 1.0,
            'latent-input': 1.0,
            'latent-recon': 1.0
        };

        // --- View Switching ---
        function switchView(mode) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${mode}`).classList.add('active');
        }

        // --- Zooom ---
        function zoom(target, dir, event) {
            if (event) event.stopPropagation();
            zoomLevels[target] += dir * 0.2;
            zoomLevels[target] = Math.max(0.4, Math.min(zoomLevels[target], 5.0));

            let imgId = '';
            if (target === 'imagine-input') imgId = 'imagine-input-preview';
            if (target === 'imagine-output') imgId = 'imagine-result-img';
            if (target === 'latent-input') imgId = 'latent-input-preview';
            if (target === 'latent-recon') imgId = 'latent-recon-img';

            const img = document.getElementById(imgId);
            if (img) img.style.transform = `scale(${zoomLevels[target]})`;
        }

        // --- Logic: Latent View ---

        // Utility: Debounce
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        const debouncedGenerateLatent = debounce(() => generateLatent(true), 150);

        // Init Sliders
        const slidersDiv = document.getElementById('sliders-container');
        for (let i = 0; i < 8; i++) {
            const row = document.createElement('div');
            row.className = 'slider-row';
            row.innerHTML = `
                <span style="width: 30px; text-align: right;">Ch${i}</span>
                <input type="range" min="-10" max="10" step="0.1" value="1.0" 
                    oninput="updateScale(${i}, this.value); debouncedGenerateLatent()"
                    >
                <span id="val-${i}" style="width: 40px; text-align: right;">1.0</span>
            `;
            slidersDiv.appendChild(row);
        }

        function updateScale(idx, val) {
            scales[idx] = parseFloat(val);
            document.getElementById(`val-${idx}`).innerText = val;
        }

        function resetSliders() {
            scales.fill(1.0);
            document.querySelectorAll('#sliders-container input').forEach(inp => inp.value = 1.0);
            document.querySelectorAll('#sliders-container span[id^="val-"]').forEach(sp => sp.innerText = '1.0');
            const fileInput = document.getElementById('latent-upload');
            if (fileInput.files[0]) generateLatent(true);
        }

        // Handle Upload & Preview
        function handleLatentUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    // Hide placeholder, show image
                    document.getElementById('latent-placeholder').style.display = 'none';
                    const img = document.getElementById('latent-input-preview');
                    img.src = ev.target.result;
                    img.style.display = 'block';

                    // Auto-trigger generation
                    generateLatent(false);
                };
                reader.readAsDataURL(file);
            }
        }

        async function generateLatent(isModification = false) {
            const fileInput = document.getElementById('latent-upload');
            if (!fileInput.files[0]) return;

            const file = fileInput.files[0];
            const caption = document.getElementById('latent-caption').value;
            const btn = document.getElementById('latent-generate-btn');
            const loader = document.getElementById('latent-loader');

            btn.disabled = true;
            btn.innerText = "Processing...";
            loader.style.display = 'flex';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('caption', caption);
            formData.append('mode', 'latent');

            if (isModification) {
                formData.append('channel_scales', JSON.stringify(scales));
            }

            try {
                const res = await fetch('/imagine', { method: 'POST', body: formData });
                if (!res.ok) throw new Error((await res.json()).detail);

                const data = await res.json();

                if (data.original_latent) {
                    const img = document.getElementById('latent-orig-img');
                    img.src = data.original_latent;
                    img.style.display = 'block';
                    if (!isModification) {
                        // On first load, also show default reconstruction
                        generateLatent(true);
                    }
                }

                if (data.reconstruction) {
                    const recon = document.getElementById('latent-recon-img');
                    recon.src = data.reconstruction;
                    recon.style.display = 'block';
                }

                if (data.modified_latent) {
                    const mod = document.getElementById('latent-mod-img');
                    mod.src = data.modified_latent;
                    mod.style.display = 'block';
                }

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Reconstruct";
                loader.style.display = 'none';
            }
        }


        // --- Logic: Imagination View ---

        function handleImagineUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imagine-placeholder').style.display = 'none';
                    const img = document.getElementById('imagine-input-preview');
                    img.src = ev.target.result;
                    img.style.display = 'block';

                    // Reset zoom
                    zoomLevels['imagine-input'] = 1.0;
                    img.style.transform = 'scale(1.0)';
                };
                reader.readAsDataURL(file);
            }
        }

        async function generateImagine() {
            const fileInput = document.getElementById('imagine-upload');
            if (!fileInput.files[0]) return alert("Please upload an image first");

            const file = fileInput.files[0];
            const caption = document.getElementById('imagine-caption').value;
            const btn = document.getElementById('imagine-generate-btn');
            const loader = document.getElementById('imagine-loader');

            btn.disabled = true;
            btn.innerText = "Processing...";
            loader.style.display = 'flex';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('caption', caption);
            formData.append('mode', 'imagination');

            try {
                const res = await fetch('/imagine', { method: 'POST', body: formData });
                if (!res.ok) throw new Error((await res.json()).detail);

                const data = await res.json();

                if (data.result) {
                    const img = document.getElementById('imagine-result-img');
                    img.src = data.result;
                    img.style.display = 'block';

                    // Reset zoom
                    zoomLevels['imagine-output'] = 1.0;
                    img.style.transform = 'scale(1.0)';
                }

                if (data.original_latent) {
                    const img = document.getElementById('imagine-orig-latent');
                    img.src = data.original_latent;
                    img.style.display = 'block';
                }

                if (data.reconstructed_latent) {
                    const img = document.getElementById('imagine-recon-latent');
                    img.src = data.reconstructed_latent;
                    img.style.display = 'block';
                }

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Imagine";
                loader.style.display = 'none';
            }
        }
    </script>
</body>

</html>
